<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bài kiểm tra MGRL Series</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --ink: #17202a;
      --muted: #5d6a78;
      --line: #d9e0ea;
      --brand: #f2791f;
      --brand-dark: #b55313;
      --ok: #167a46;
      --bad: #b42318;
      --panel: #ffffff;
      --soft: #eef4f9;
      --focus: #1167b1;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Montserrat", Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--ink);
    }

    header {
      background: #ffffff;
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
      z-index: 5;
    }

    .topbar {
      max-width: 1180px;
      margin: 0 auto;
      padding: 16px 20px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
    }

    .title {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }

    .mark {
      width: 42px;
      height: 42px;
      border-radius: 8px;
      background:
        linear-gradient(135deg, #f2791f 0 50%, transparent 50%),
        linear-gradient(315deg, #1167b1 0 50%, #ffffff 50%);
      border: 1px solid #f0b07a;
      flex: 0 0 auto;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .sub {
      color: var(--muted);
      font-size: 13px;
      margin-top: 4px;
    }

    .timer {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      border: 1px solid var(--line);
      background: var(--soft);
      border-radius: 8px;
      padding: 10px 12px;
      font-weight: 700;
      min-width: 152px;
      justify-content: center;
    }

    .timer::before {
      content: "";
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--ok);
      display: inline-block;
    }

    .timer.warning::before { background: var(--bad); }

    main {
      max-width: 1180px;
      margin: 0 auto;
      padding: 22px 20px 48px;
    }

    .setup, .result, .question {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 10px 30px rgba(20, 36, 58, 0.06);
    }

    .setup {
      padding: 20px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: end;
    }

    label {
      display: block;
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 8px;
      font-weight: 700;
    }

    input[type="text"] {
      width: 100%;
      max-width: 520px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px 13px;
      font-size: 15px;
      color: var(--ink);
      outline: none;
      background: #ffffff;
    }

    .field-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      align-items: end;
    }

    .field-grid input[type="text"] {
      max-width: none;
    }

    input[type="text"]:focus {
      border-color: var(--focus);
      box-shadow: 0 0 0 3px rgba(17, 103, 177, 0.16);
    }

    button {
      border: 0;
      border-radius: 8px;
      padding: 12px 16px;
      background: var(--brand);
      color: #ffffff;
      font-weight: 700;
      cursor: pointer;
      font-size: 15px;
      min-height: 44px;
    }

    button:hover { background: var(--brand-dark); }
    button:disabled { cursor: not-allowed; opacity: 0.55; }

    .secondary {
      background: #ffffff;
      color: var(--ink);
      border: 1px solid var(--line);
    }

    .secondary:hover { background: var(--soft); }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .pill {
      border: 1px solid var(--line);
      background: var(--soft);
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 13px;
      color: var(--muted);
      font-weight: 700;
    }

    .quizbar {
      display: none;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      margin: 18px 0;
    }

    .progress {
      height: 10px;
      background: #dfe7ef;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress span {
      display: block;
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, #1167b1, #f2791f);
      transition: width 180ms ease;
    }

    .answered {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }

    .questions {
      display: grid;
      gap: 14px;
      margin-top: 18px;
    }

    .question {
      padding: 18px;
    }

    .qhead {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 12px;
      align-items: start;
    }

    .qno {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: #17202a;
      color: #ffffff;
      font-weight: 700;
      font-size: 14px;
    }

    .qtext {
      font-size: 16px;
      line-height: 1.45;
      font-weight: 700;
      padding-top: 5px;
    }

    .options {
      display: grid;
      gap: 9px;
      margin-top: 14px;
    }

    .option {
      display: grid;
      grid-template-columns: 20px 34px minmax(0, 1fr);
      gap: 12px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 13px 16px;
      background: #ffffff;
      cursor: pointer;
      min-height: 54px;
    }

    .option:hover { background: #f8fbff; border-color: #b9c9d9; }
    .option input { margin: 0; width: 17px; height: 17px; }
    .letter {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: #f1f5f9;
      color: #334155;
      font-weight: 800;
      font-size: 14px;
      line-height: 1;
    }

    .answer-text {
      min-width: 0;
      line-height: 1.35;
      color: #334155;
      font-size: 15px;
      font-weight: 600;
      overflow-wrap: anywhere;
    }

    .option:has(input:checked) {
      border-color: #7aa7ff;
      background: #f4f8ff;
    }

    .option:has(input:checked) .letter {
      background: #477cff;
      color: #ffffff;
    }

    .question.correct { border-color: rgba(22, 122, 70, 0.42); }
    .question.incorrect { border-color: rgba(180, 35, 24, 0.42); }
    .option.correct { border-color: var(--ok); background: #eef8f2; }
    .option.incorrect { border-color: var(--bad); background: #fff1ef; }

    .explain {
      display: none;
      margin-top: 12px;
      color: var(--muted);
      background: #f8fafc;
      border-left: 4px solid var(--line);
      padding: 10px 12px;
      line-height: 1.45;
      font-size: 14px;
    }

    .submitted .explain { display: block; }

    .actions {
      display: none;
      position: sticky;
      bottom: 0;
      background: rgba(245, 247, 251, 0.94);
      backdrop-filter: blur(8px);
      padding: 14px 0 0;
      margin-top: 18px;
      gap: 10px;
      justify-content: flex-end;
    }

    .result {
      display: none;
      padding: 18px;
      margin-top: 18px;
      border-left: 6px solid var(--brand);
    }

    .score {
      font-size: 28px;
      font-weight: 800;
      margin: 0 0 6px;
    }

    .result-status {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      padding: 7px 12px;
      margin-left: 8px;
      font-size: 15px;
      font-weight: 800;
      vertical-align: middle;
    }

    .result-status.pass {
      background: #eef8f2;
      color: var(--ok);
      border: 1px solid rgba(22, 122, 70, 0.3);
    }

    .result-status.failed {
      background: #fff1ef;
      color: var(--bad);
      border: 1px solid rgba(180, 35, 24, 0.3);
    }

    .result p { margin: 6px 0 0; color: var(--muted); }

    @media (max-width: 720px) {
      .topbar, .setup, .quizbar {
        grid-template-columns: 1fr;
      }

      .field-grid {
        grid-template-columns: 1fr;
      }

      .timer {
        justify-content: flex-start;
        width: 100%;
      }

      .setup button, .actions button {
        width: 100%;
      }

      .actions {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="topbar">
      <div class="title">
        <div class="mark" aria-hidden="true"></div>
        <div>
          <h1>Bài kiểm tra MGRL Series B0</h1>
          <div class="sub">Product Training on MGRL - Sungrow</div>
        </div>
      </div>
      <div id="timer" class="timer">60:00</div>
    </div>
  </header>

  <main>

        <div class="field-grid">

            <label for="studentName">Người làm bài</label>

          </div>
          <div>
            <label for="companyName">Công ty</label>
            <input id="companyName" type="text" placeholder="Nhập tên công ty" required>
          </div>
          <div>
            <label for="contactInfo">Email/SĐT</label>
            <input id="contactInfo" type="text" placeholder="Nhập email hoặc số điện thoại" required>
          </div>
        </div>
        <div class="meta">
          <span class="pill">30 câu mỗi lượt</span>
          <span class="pill">Ngân hàng 100 câu</span>
          <span class="pill">Thời gian 60 phút</span>
          <span class="pill">Xáo trộn câu hỏi và đáp án</span>
        </div>
      </div>
      <button id="startBtn" type="button">Bắt đầu</button>
    </section>

    <section id="result" class="result" aria-live="polite"></section>

    <div id="quizbar" class="quizbar">
      <div class="progress" aria-hidden="true"><span id="progressFill"></span></div>
      <div id="answered" class="answered">0/30 đã chọn</div>
    </div>

    <form id="quiz" class="questions"></form>

    <div id="actions" class="actions">
      <button id="submitBtn" type="button">Nộp bài</button>
      <button id="restartBtn" class="secondary" type="button">Làm đề khác</button>
    </div>
  </main>

    const letters = ["A", "B", "C", "D"];
    let quizQuestions = [];
    let selected = new Map();
    let remaining = DURATION_SECONDS;
    let timerId = null;
    let submitted = false;

    const setupEl = document.getElementById("setup");
    const quizEl = document.getElementById("quiz");
    const resultEl = document.getElementById("result");
    const quizbarEl = document.getElementById("quizbar");
    const actionsEl = document.getElementById("actions");
    const timerEl = document.getElementById("timer");
    const answeredEl = document.getElementById("answered");
    const progressFill = document.getElementById("progressFill");
    const startBtn = document.getElementById("startBtn");
    const submitBtn = document.getElementById("submitBtn");
    const restartBtn = document.getElementById("restartBtn");
    const nameInput = document.getElementById("studentName");
    const companyInput = document.getElementById("companyName");
    const contactInput = document.getElementById("contactInfo");

    function shuffle(items) {
      const arr = items.slice();
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function formatTime(total) {
      const minutes = Math.floor(total / 60).toString().padStart(2, "0");
      const seconds = (total % 60).toString().padStart(2, "0");
      return `${minutes}:${seconds}`;
    }

    function prepareQuiz() {
      quizQuestions = shuffle(questionBank).slice(0, QUESTION_COUNT).map((item, index) => {
        const options = item.options.map((text, optionIndex) => ({
          text,
          correct: optionIndex === item.answer
        }));
        return {
          ...item,
          no: index + 1,
          shuffledOptions: shuffle(options)
        };
      });
    }

    function renderQuiz() {
      quizEl.innerHTML = quizQuestions.map((item, index) => {
        const options = item.shuffledOptions.map((option, optionIndex) => `
          <label class="option" data-q="${index}" data-option="${optionIndex}">
            <input type="radio" name="q${index}" value="${optionIndex}">
            <span class="letter">${letters[optionIndex]}</span>
            <span class="answer-text">${option.text}</span>
          </label>
        `).join("");

        return `
          <section class="question" data-question="${index}">
            <div class="qhead">
              <div class="qno">${index + 1}</div>
              <div class="qtext">${item.q}</div>
            </div>
            <div class="options">${options}</div>
            <div class="explain">${item.explain}</div>
          </section>
        `;
      }).join("");
    }

    function updateProgress() {
      const count = selected.size;
      answeredEl.textContent = `${count}/${QUESTION_COUNT} đã chọn`;
      progressFill.style.width = `${(count / QUESTION_COUNT) * 100}%`;
    }

    function startTimer() {
      clearInterval(timerId);
      remaining = DURATION_SECONDS;
      timerEl.textContent = formatTime(remaining);
      timerEl.classList.remove("warning");
      timerId = setInterval(() => {
        remaining -= 1;
        timerEl.textContent = formatTime(Math.max(remaining, 0));
        if (remaining <= 300) timerEl.classList.add("warning");
        if (remaining <= 0) submitQuiz(true);
      }, 1000);
    }

    function startQuiz() {
      const requiredFields = [nameInput, companyInput, contactInput];
      const emptyField = requiredFields.find((field) => !field.value.trim());
      if (emptyField) {
        emptyField.reportValidity();
        emptyField.focus();
        return;
      }

      submitted = false;
      selected = new Map();
      resultEl.style.display = "none";
      resultEl.innerHTML = "";
      setupEl.style.display = "none";
      quizbarEl.style.display = "grid";
      actionsEl.style.display = "flex";
      quizEl.classList.remove("submitted");
      prepareQuiz();
      renderQuiz();
      updateProgress();
      startTimer();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function buildSubmission(score, percent, resultStatus, auto) {
      const answers = quizQuestions.map((item, questionIndex) => {
        const chosenIndex = selected.get(questionIndex);
        const chosenOption = Number.isInteger(chosenIndex) ? item.shuffledOptions[chosenIndex] : null;
        const correctOption = item.shuffledOptions.find((option) => option.correct);
        return {
          no: questionIndex + 1,
          question: item.q,
          selected: chosenOption ? chosenOption.text : "",
          correct: correctOption ? correctOption.text : "",
          isCorrect: Boolean(chosenOption && chosenOption.correct)
        };
      });

      return {
        submittedAt: new Date().toISOString(),
        name: nameInput.value.trim(),
        company: companyInput.value.trim(),
        contact: contactInput.value.trim(),
        score,
        total: QUESTION_COUNT,
        percent,
        resultStatus,
        autoSubmitted: auto,
        durationSeconds: DURATION_SECONDS - Math.max(remaining, 0),
        answers
      };
    }

    async function saveSubmission(payload) {
      if (!APPS_SCRIPT_URL) {
        return { skipped: true };
      }

      await fetch(APPS_SCRIPT_URL, {
        method: "POST",
        mode: "no-cors",
        headers: {
          "Content-Type": "text/plain;charset=utf-8"
        },
        body: JSON.stringify(payload)
      });

      return { skipped: false };
    }

    function submitQuiz(auto = false) {
      if (submitted) return;
      submitted = true;
      clearInterval(timerId);

      let score = 0;
      quizQuestions.forEach((item, questionIndex) => {
        const questionEl = quizEl.querySelector(`[data-question="${questionIndex}"]`);
        const chosenIndex = selected.get(questionIndex);
        const optionEls = questionEl.querySelectorAll(".option");
        let isCorrect = false;

        optionEls.forEach((optionEl, optionIndex) => {
          const input = optionEl.querySelector("input");
          input.disabled = true;
          const option = item.shuffledOptions[optionIndex];
          if (option.correct) optionEl.classList.add("correct");
          if (chosenIndex === optionIndex && !option.correct) optionEl.classList.add("incorrect");
          if (chosenIndex === optionIndex && option.correct) isCorrect = true;
        });

        if (isCorrect) {
          score += 1;
          questionEl.classList.add("correct");
        } else {
          questionEl.classList.add("incorrect");
        }
      });

      const student = nameInput.value.trim() || "Người làm bài";
      const percent = Math.round((score / QUESTION_COUNT) * 100);
      const resultStatus = percent >= 80 ? "PASS" : "FAILED";
      const resultStatusClass = resultStatus === "PASS" ? "pass" : "failed";
      const payload = buildSubmission(score, percent, resultStatus, auto);
      resultEl.innerHTML = `
      <div class="score">${score}/${QUESTION_COUNT} điểm - ${percent}% <span class="result-status ${resultStatusClass}">${resultStatus}</span></div>
      <p>${student}${auto ? " đã hết thời gian và bài đã được nộp tự động." : " đã hoàn thành bài kiểm tra."}</p>
      <p>Các câu đúng/sai và giải thích đang hiển thị bên dưới.</p>
      <p id="saveStatus">Đang lưu kết quả...</p>
      `;
      resultEl.style.display = "block";
      quizEl.classList.add("submitted");
      submitBtn.disabled = true;
      timerEl.textContent = auto ? "00:00" : timerEl.textContent;
      window.scrollTo({ top: 0, behavior: "smooth" });

      const saveStatus = document.getElementById("saveStatus");
      saveSubmission(payload)
        .then((result) => {
          saveStatus.textContent = result.skipped
            ? "Chưa cấu hình Google Sheets, kết quả chỉ hiển thị trên trình duyệt này."
            : "Đã gửi kết quả về Google Sheets.";
        })
        .catch(() => {
          saveStatus.textContent = "Không gửi được kết quả về Google Sheets. Vui lòng kiểm tra kết nối hoặc Apps Script URL.";
        });
    }

    quizEl.addEventListener("change", (event) => {
      if (submitted || event.target.type !== "radio") return;
      const questionIndex = Number(event.target.name.replace("q", ""));
      selected.set(questionIndex, Number(event.target.value));
      updateProgress();
    });

    startBtn.addEventListener("click", startQuiz);
    submitBtn.addEventListener("click", () => submitQuiz(false));
    restartBtn.addEventListener("click", () => {
      clearInterval(timerId);
      submitBtn.disabled = false;
      startQuiz();
    });
  </script>
